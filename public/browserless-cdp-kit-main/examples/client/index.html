<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>browserless-cdp-kit client</title>
    <style>
      body { font-family: Arial, sans-serif; background:#111; color:#ddd; margin:0; }
      .bar { display:flex; gap:8px; padding:8px; background:#1a1a1a; align-items:center; }
      .bar input { flex:1; padding:6px; background:#222; color:#ddd; border:1px solid #333; }
      .bar button { padding:6px 8px; background:#222; color:#ddd; border:1px solid #333; }
      .frame { width:100%; max-width:1100px; margin:12px auto; background:#000; border:1px solid #333; aspect-ratio: 16/9; display:flex; align-items:center; justify-content:center; }
      .frame img { width:100%; height:100%; object-fit:contain; }
      .status { font-size:12px; padding:0 8px 8px; color:#aaa; }
    </style>
  </head>
  <body>
    <div class="bar">
      <button id="back">&lt;</button>
      <button id="forward">&gt;</button>
      <button id="reload">Reload</button>
      <input id="url" placeholder="https://example.com" />
      <button id="connect">Connect</button>
    </div>
    <div class="status" id="status">Disconnected</div>
    <div class="frame" id="frame">
      <div>Waiting for frame…</div>
    </div>
    <script src="./client.js"></script>
  </body>
</html>
